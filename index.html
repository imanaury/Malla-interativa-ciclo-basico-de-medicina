}

}

.bloqueada{
  background:#9ca3af;
  opacity:0.5;
  cursor:not-allowed;
}

}

{n:"Lab Farmacología",id:"CFI2470",req:["CFI2350"],s:"M4"},

{n:"Lab Fisiopatología II",id:"CFI1570",req:["CFI1550"],s:"M4"},
{n:"Inmunología",id:"BAN2180",req:["CFI2350","CMO3160"],s:"M4"}

];

let estado = JSON.parse(localStorage.getItem("estado")) || {};

function aprobado(id){return estado[id]===true;}
function desbloqueado(m){return m.req.every(r=>aprobado(r));}

function toggle(id){
 let m=materias.find(x=>x.id===id);
 if(!desbloqueado(m))return;
 estado[id]=!estado[id];
 localStorage.setItem("estado",JSON.stringify(estado));
 render();
}

function progreso(){
 let total=materias.length;
 let aprobadas=Object.values(estado).filter(v=>v).length;
 return Math.round((aprobadas/total)*100);
}

function render(){
 let cont=document.getElementById("contenedor");
 cont.innerHTML="";

 let orden=["P1","P2","P3","P4","M1","M2","M3","M4"];

 orden.forEach(s=>{
   let div=document.createElement("div");
   div.className="semestre";
   div.innerHTML="<h3>"+s+"</h3>";

   materias.filter(m=>m.s===s).forEach(m=>{
     let mat=document.createElement("div");
     mat.className="materia";

     if(aprobado(m.id)) mat.classList.add("aprobada");
     else if(!desbloqueado(m)) mat.classList.add("bloqueada");
     else mat.classList.add("disponible");

     mat.innerText=m.n;
     mat.onclick=()=>toggle(m.id);

     div.appendChild(mat);
   });

   cont.appendChild(div);
 });

 document.getElementById("progreso").innerText="Progreso: "+progreso()+"%";
}

render();

</script>

</body>
</html>
